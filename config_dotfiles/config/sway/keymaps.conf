floating_modifier $mod
bindsym $mod+Return exec footclient
bindsym $mod+d exec wofi --show drun
bindsym $mod+b exec firefox --new-tab
bindsym $mod+Shift+b exec firefox --private-window
bindsym $mod+Shift+Return exec pcmanfm
bindsym $mod+Shift+q kill
bindsym $mod+Shift+r reload
bindsym $mod+m fullscreen toggle
bindsym $mod+space floating toggle
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right
bindsym $mod+Ctrl+h resize shrink width 5ppt
bindsym $mod+Ctrl+l resize grow width 5ppt
bindsym $mod+Ctrl+k resize shrink height 5ppt
bindsym $mod+Ctrl+j resize grow height 5ppt
bindsym $mod+1 workspace $ws1
bindsym $mod+2 workspace $ws2
bindsym $mod+3 workspace $ws3
bindsym $mod+4 workspace $ws4
bindsym $mod+5 workspace $ws5
bindsym $mod+6 workspace $ws6
bindsym $mod+7 workspace $ws7
bindsym $mod+8 workspace $ws8
bindsym $mod+Shift+1 move container to workspace $ws1
bindsym $mod+Shift+2 move container to workspace $ws2
bindsym $mod+Shift+3 move container to workspace $ws3
bindsym $mod+Shift+4 move container to workspace $ws4
bindsym $mod+Shift+5 move container to workspace $ws5
bindsym $mod+Shift+6 move container to workspace $ws6
bindsym $mod+Shift+7 move container to workspace $ws7
bindsym $mod+Shift+8 move container to workspace $ws8
bindsym $mod+Tab workspace next_on_output
bindsym $mod+Shift+Tab workspace prev_on_output
bindsym Mod1+Tab focus next
bindsym Mod1+Shift+Tab focus prev
bindsym $mod+Shift+x exec ~/.config/custom_scripts/lock.sh
bindsym $mod+Shift+e exec ~/.config/custom_scripts/power.sh
bindsym Print exec grim ~/Pictures/screenshots/$(date +'%Y-%m-%d_%H-%M-%S.png')
bindsym $mod+Print exec grim - | swappy -f -
bindsym XF86MonBrightnessUp exec brightnessctl set +5%
bindsym XF86MonBrightnessDown exec brightnessctl --min-value=1 set 5%-
bindsym XF86AudioRaiseVolume exec wpctl set-volume -l 1.3 @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous
mode "script" {
  bindsym b exec $waybarThemeSwitcher
  bindsym w exec ~/.config/custom_scripts/chooseBackgroundImage.sh; mode "default"
  bindsym t exec ~/.config/custom_scripts/wlsunset.sh; mode "default"
  bindsym Escape mode "default"
  bindsym Return mode "default"
}
bindsym $mod+Shift+s mode "script"
