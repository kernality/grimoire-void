bar {
  swaybar_command waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
}
exec foot --server
# Void PipeWire drop-ins launch WirePlumber and pipewire-pulse.
exec pipewire
exec mako
exec xdg-user-dirs-update
exec dbus-update-activation-environment WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec /bin/sh -c 'for a in /usr/lib/mate-polkit/polkit-mate-authentication-agent-1 /usr/libexec/polkit-mate-authentication-agent-1; do [ -x "$a" ] && exec "$a"; done'
exec /bin/sh -c 'sleep 1; exec nm-applet --indicator'
exec swayidle -w \
  timeout 300 '~/.config/custom_scripts/lock.sh' \
  timeout 600 'swaymsg "output * power off"' \
  resume 'swaymsg "output * power on"' \
  before-sleep '~/.config/custom_scripts/lock.sh'
exec ~/.config/custom_scripts/setBackground.sh
exec ~/.config/custom_scripts/batteryWarning.sh
exec ~/.config/custom_scripts/tempWarning.sh
